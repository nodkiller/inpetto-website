name: Sync CMS Content

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '_works/**'
      - '_team/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-blog.js

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/blog.json _data/works.json _data/team.json
          git diff --staged --quiet || git commit -m "chore: sync content data from CMS"
          git push

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Authenticating…</title>
</head>
<body>
  <script>
    // Same-origin bridge for Sveltia CMS GitHub OAuth
    // Receives the message from the OAuth worker and forwards to the CMS window
    const channel = new BroadcastChannel('inpetto-cms-auth');

    function receiveMessage(event) {
      if (event.data && event.data.token) {
        channel.postMessage({ token: event.data.token, provider: 'github' });
        window.close();
      }
    }

    window.addEventListener('message', receiveMessage, false);

    // If opened directly with hash params (implicit flow fallback)
    if (window.location.hash) {
      const params = new URLSearchParams(window.location.hash.slice(1));
      const token = params.get('access_token');
      if (token) {
        channel.postMessage({ token, provider: 'github' });
        window.close();
      }
    }

    // Also notify opener directly if same origin
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ token: new URLSearchParams(window.location.hash.slice(1)).get('access_token') }, '*');
    }
  </script>
  <p style="font-family: sans-serif; color: #888; padding: 40px; text-align: center;">
    Authenticating… this window will close automatically.
  </p>
</body>
</html>
